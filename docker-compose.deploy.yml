services:
  chrome:
    build:
      context: ./docker/chrome
    expose:
      - "9222"
    volumes:
      - ./data/chrome-profile:/data/chrome-profile
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9222/json/version >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  wsj-worker:
    build:
      context: ./worker/wsj-worker
    depends_on:
      chrome:
        condition: service_healthy
    environment:
      - BROWSER_CDP_URL=${BROWSER_CDP_URL:-http://chrome:9222}
      - SCRAPER_WORKER_SECRET=${SCRAPER_WORKER_SECRET:-}
      - AUDIO_PUBLIC_DIR=/app/public/audio
      - ORIGINAL_AUDIO_WHISPER_MODEL=${ORIGINAL_AUDIO_WHISPER_MODEL:-base.en}
      - ORIGINAL_AUDIO_WHISPER_DEVICE=${ORIGINAL_AUDIO_WHISPER_DEVICE:-cpu}
      - ORIGINAL_AUDIO_WHISPER_COMPUTE_TYPE=${ORIGINAL_AUDIO_WHISPER_COMPUTE_TYPE:-int8}
      - ORIGINAL_AUDIO_ALIGNMENT_MIN_SCORE=${ORIGINAL_AUDIO_ALIGNMENT_MIN_SCORE:-0.62}
      - ORIGINAL_AUDIO_ALIGNMENT_SEARCH_WORDS=${ORIGINAL_AUDIO_ALIGNMENT_SEARCH_WORDS:-240}
      - ORIGINAL_AUDIO_ALIGNMENT_INITIAL_SEARCH_WORDS=${ORIGINAL_AUDIO_ALIGNMENT_INITIAL_SEARCH_WORDS:-480}
    volumes:
      - ./public/audio:/app/public/audio
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  app:
    image: ${ECHOREAD_IMAGE:-ghcr.io/warjiang/echoread:latest}
    pull_policy: always
    depends_on:
      wsj-worker:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=file:/app/data/shadow-reading.db
      - WSJ_EMAIL=${WSJ_EMAIL}
      - WSJ_PASSWORD=${WSJ_PASSWORD}
      - WSJ_STORAGE_PATH=/app/data/.wsj-auth.json
      - WSJ_WORKER_URL=http://wsj-worker:8000/jobs
      - ORIGINAL_AUDIO_WORKER_URL=http://wsj-worker:8000/audio/jobs
      - ORIGINAL_AUDIO_MIN_COVERAGE=${ORIGINAL_AUDIO_MIN_COVERAGE:-0.9}
      - ORIGINAL_AUDIO_MAX_ATTEMPTS=${ORIGINAL_AUDIO_MAX_ATTEMPTS:-3}
      - ORIGINAL_AUDIO_TIMEOUT_SECONDS=${ORIGINAL_AUDIO_TIMEOUT_SECONDS:-300}
      - SCRAPER_CALLBACK_BASE_URL=http://app:3000
      - SCRAPER_WORKER_SECRET=${SCRAPER_WORKER_SECRET:-}
      - MATERIAL_WORKER_SECRET=${MATERIAL_WORKER_SECRET:-}
      - TTS_PROVIDER=${TTS_PROVIDER:-edge}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai-compatible}
      - LLM_MODEL_HIGH_QUALITY=${LLM_MODEL_HIGH_QUALITY:-gpt-4.1}
      - LLM_BASE_URL=${LLM_BASE_URL:-${OPENAI_BASE_URL:-}}
      - LLM_API_KEY=${LLM_API_KEY:-${OPENAI_API_KEY:-}}
      - LLM_RESPONSE_FORMAT=${LLM_RESPONSE_FORMAT:-json_object}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.4}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      - ./data:/app/data
      - ./public/audio:/app/public/audio
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  bootstrap-scrape:
    image: curlimages/curl:8.8.0
    depends_on:
      app:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "echo 'Creating initial scrape job...' && curl -fsS -X POST -H \"Authorization: Bearer ${SCRAPER_WORKER_SECRET:-}\" http://app:3000/api/scraper && echo 'Initial scrape job created.'",
      ]
    restart: "no"
