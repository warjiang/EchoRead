services:
  chrome:
    build:
      context: ./docker/chrome
    expose:
      - "9222"
    volumes:
      - ./data/chrome-profile:/data/chrome-profile
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9222/json/version >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  wsj-worker:
    build:
      context: ./worker/wsj-worker
    depends_on:
      chrome:
        condition: service_healthy
    environment:
      - BROWSER_CDP_URL=${BROWSER_CDP_URL:-http://chrome:9222}
      - BROWSER_AGENT_MODEL=${BROWSER_AGENT_MODEL:-gpt-4.1-mini}
      - BROWSER_AGENT_BASE_URL=${BROWSER_AGENT_BASE_URL:-${OPENAI_BASE_URL:-}}
      - BROWSER_AGENT_API_KEY=${BROWSER_AGENT_API_KEY:-${OPENAI_API_KEY:-}}
      - BROWSER_AGENT_MAX_STEPS=${BROWSER_AGENT_MAX_STEPS:-80}
      - BROWSER_AGENT_RESPONSE_FORMAT=${BROWSER_AGENT_RESPONSE_FORMAT:-prompt_json}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - SCRAPER_WORKER_SECRET=${SCRAPER_WORKER_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  app:
    build: .
    depends_on:
      wsj-worker:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/shadow-reading.db
      - WSJ_EMAIL=${WSJ_EMAIL}
      - WSJ_PASSWORD=${WSJ_PASSWORD}
      - WSJ_STORAGE_PATH=/app/data/.wsj-auth.json
      - WSJ_WORKER_URL=http://wsj-worker:8000/scrape
      - SCRAPER_WORKER_SECRET=${SCRAPER_WORKER_SECRET:-}
      - MATERIAL_WORKER_SECRET=${MATERIAL_WORKER_SECRET:-}
      - TTS_PROVIDER=${TTS_PROVIDER:-edge}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai-compatible}
      - LLM_MODEL_HIGH_QUALITY=${LLM_MODEL_HIGH_QUALITY:-gpt-4.1}
      - LLM_BASE_URL=${LLM_BASE_URL:-${OPENAI_BASE_URL:-}}
      - LLM_API_KEY=${LLM_API_KEY:-${OPENAI_API_KEY:-}}
      - LLM_RESPONSE_FORMAT=${LLM_RESPONSE_FORMAT:-json_object}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.4}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - ./data:/app/data
      - ./public/audio:/app/public/audio
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  bootstrap-scrape:
    image: curlimages/curl:8.8.0
    depends_on:
      app:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "echo 'Triggering initial scrape...' && curl -fsS -X POST -H \"Authorization: Bearer ${SCRAPER_WORKER_SECRET:-}\" http://app:3000/api/scraper && echo 'Initial scrape completed.'",
      ]
    restart: "no"
