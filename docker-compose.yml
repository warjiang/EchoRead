services:
  browser:
    image: mcr.microsoft.com/playwright:v1.60.0-jammy
    command: ["npx", "-y", "playwright@1.60.0", "run-server", "--port=3000", "--host=0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  app:
    build: .
    depends_on:
      browser:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/shadow-reading.db
      - WSJ_EMAIL=${WSJ_EMAIL}
      - WSJ_PASSWORD=${WSJ_PASSWORD}
      - WSJ_STORAGE_PATH=/app/data/.wsj-auth.json
      - PLAYWRIGHT_WS_ENDPOINT=${PLAYWRIGHT_WS_ENDPOINT:-ws://browser:3000/}
      - TTS_PROVIDER=${TTS_PROVIDER:-edge}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - ./data:/app/data
      - ./public/audio:/app/public/audio
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  bootstrap-scrape:
    image: curlimages/curl:8.8.0
    depends_on:
      app:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "echo 'Triggering initial scrape...' && curl -fsS -X POST http://app:3000/api/scraper && echo 'Initial scrape completed.'",
      ]
    restart: "no"
